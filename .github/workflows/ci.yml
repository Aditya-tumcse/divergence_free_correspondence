name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Fast job: clang-format check (no build needed)
  # ---------------------------------------------------------------------------
  format:
    name: Format check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find divergence_free_corr/include divergence_free_corr/src \
            \( -name "*.hpp" -o -name "*.cpp" \) \
            -print0 | xargs -0 clang-format --dry-run --Werror

  # ---------------------------------------------------------------------------
  # Full build + test job
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build clang-tidy \
            pkg-config libflann-dev

      - name: Set up Python & Conan
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-${{ runner.os }}-

      - name: Install dependencies
        run: |
          conan install . --output-folder=build --build=missing \
            -s build_type=Release -s compiler.cppstd=20

      - name: Configure
        run: cmake --preset release

      - name: Build
        run: cmake --build --preset release

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: clang-tidy
        run: |
          find divergence_free_corr/src -name "*.cpp" -print0 | \
            xargs -0 clang-tidy -p build/
